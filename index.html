<script>
// ══════════════════════════════════════════════════
// CONFIG — ОБОВ'ЯЗКОВО заміни на своє реальне посилання!
const API = 'https://script.google.com/macros/s/ТВОЄ_ПОВНЕ_ПОСИЛАННЯ/exec';
// Приклад: 'https://script.google.com/macros/s/AKfycbw123456789/exec'

const RANKS = ['Співбесіда','Студент','Інтерн','Парамедик','Фельдшер','Терапевт','Хірург','Спеціаліст','Заст.зав.відділу','Завідувач відділу','Заст.голов.лікаря'];
const ALBL = {hired:'✅ Прийнято на роботу', transfer:'🔄 Переведено', fired:'❌ Звільнено'};
const ABCL = {hired:'bh', transfer:'bt', fired:'bf'};

// ── STATE ──
let me = null;
let players = [], allH = [], filtH = [], curHF = 'all', curHPg = 1;
let allR = [], filtR = [], curRF = 'all';
let allRH = [], filtRH = [], curRHPg = 1;
let delId = null, curPlayer = null;
const PER = 15;

// ══════════════════════════════════════════════════
// ОСНОВНА ФУНКЦІЯ ЗАПИТІВ (GET)
// ══════════════════════════════════════════════════
async function call(action, params = {}) {
  // Додаємо action до параметрів
  const allParams = { action, ...params };
  
  // Створюємо URLSearchParams
  const query = new URLSearchParams();
  for (const key in allParams) {
    if (allParams[key] !== undefined && allParams[key] !== null) {
      query.append(key, allParams[key]);
    }
  }

  const url = API + '?' + query.toString();

  try {
    console.log(`[API] Запит: ${action}`); // для дебагу

    const response = await fetch(url, {
      method: 'GET',
      headers: {
        'Accept': 'application/json'
      },
      // mode: 'no-cors' — НЕ використовувати! (заважає читати відповідь)
    });

    if (!response.ok) {
      console.error(`HTTP Error: ${response.status} ${response.statusText}`);
      throw new Error(`Сервер повернув статус ${response.status}`);
    }

    const text = await response.text();
    
    // Захист від порожньої відповіді або HTML помилки від Google
    if (!text || text.trim() === '') {
      throw new Error('Сервер повернув порожню відповідь');
    }

    let json;
    try {
      json = JSON.parse(text);
    } catch (e) {
      console.error("Не валідний JSON від сервера:", text.substring(0, 300));
      throw new Error('Сервер повернув невалідну відповідь (не JSON)');
    }

    if (json.error) {
      console.warn(`API Error: ${json.error}`);
    }

    return json;

  } catch (e) {
    console.error(`Помилка запиту ${action}:`, e);
    throw e; // щоб catch у doLogin / submitAudit спрацював
  }
}

// ══════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════
async function doLogin(){
  const login = document.getElementById('loginInp').value.trim();
  if(!login) return showLoginErr('Введіть логін');

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Перевірка...';

  try {
    const r = await call('login', {login});
    
    if(r.success){
      me = r.user;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('sideNick').textContent = me.nick || me.login;
      document.getElementById('sideAv').textContent = (me.nick || me.login)[0].toUpperCase();
      document.getElementById('sideRole').textContent = me.isAdmin ? 'Адміністратор' : 'Співробітник';
      loadPlayers();
    } else {
      showLoginErr(r.error || 'Невірний логін');
    }
  } catch(e) {
    console.error(e);
    showLoginErr('Помилка з\'єднання з сервером. Перевір консоль (F12)');
  }

  btn.disabled = false;
  btn.innerHTML = `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:13px;height:13px"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Увійти`;
}

function showLoginErr(m){
  const e = document.getElementById('loginErr');
  e.textContent = m;
  e.style.display = 'block';
}

// ... (весь інший код залишається без змін — від NAVIGATION до кінця)

// ══════════════════════════════════════════════════
// UTILS (залишаємо тільки необхідне)
// ══════════════════════════════════════════════════
function openM(id){ document.getElementById(id).classList.add('open'); }
function closeM(id){ document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => {
    if(e.target === o) o.classList.remove('open');
  });
});

let tt;
function toast(msg, type = 'ok'){
  const t = document.getElementById('toast');
  document.getElementById('tIco').textContent = type === 'ok' ? '✅' : '❌';
  document.getElementById('tMsg').textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(tt);
  tt = setTimeout(() => t.className = '', 3200);
}

function esc(s){
  return String(s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// Ініціалізація навігації (залишається як було)
document.querySelectorAll('.snav').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.snav').forEach(x => x.classList.remove('on'));
    document.querySelectorAll('.page').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    const pg = document.getElementById('page-' + b.dataset.p);
    if(pg) pg.classList.add('on');

    if(b.dataset.p === 'history') loadHistory();
    if(b.dataset.p === 'stats') loadStats();
    if(b.dataset.p === 'roster') loadRoster();
    if(b.dataset.p === 'rhistory') loadRHistory();
  });
});
</script>
